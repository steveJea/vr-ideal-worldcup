<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR 이상형 월드컵 Beta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif; background-size: cover; background-position: center; background-attachment: fixed; }
    .overlay { background: rgba(0,0,0,0.72); position: absolute; inset: 0; z-index: 1; }
  </style>
</head>
<body id="body" class="text-white min-h-screen relative">

  <!-- START SCREEN -->
  <div id="start-screen" class="min-h-screen relative">
    <div class="overlay"></div>
    <div class="max-w-2xl mx-auto px-6 text-center relative z-10 pt-16">
      <img src="https://raw.githubusercontent.com/steveJea/vr-ideal-worldcup/main/img/stage_bg/title.png" class="mx-auto mb-10 max-w-md" alt="Title">

      <div class="mb-8">
        <div class="text-xs font-semibold tracking-widest text-violet-300 mb-4">성별 선택</div>
        <div class="grid grid-cols-3 gap-4" id="gender-buttons">
          <div data-gender="male" class="gender-btn cursor-pointer border-2 border-slate-700 hover:border-violet-500 bg-black/70 rounded-3xl p-5 transition-all backdrop-blur-md">남성</div>
          <div data-gender="female" class="gender-btn cursor-pointer border-2 border-slate-700 hover:border-violet-500 bg-black/70 rounded-3xl p-5 transition-all backdrop-blur-md">여성</div>
          <div data-gender="mix" class="gender-btn cursor-pointer border-2 border-slate-700 hover:border-violet-500 bg-black/70 rounded-3xl p-5 transition-all backdrop-blur-md">혼합</div>
        </div>
      </div>

      <div class="mb-8">
        <div class="text-xs font-semibold tracking-widest text-violet-300 mb-4">토너먼트 규모 선택</div>
        <div class="grid grid-cols-3 gap-4" id="size-buttons"></div>
      </div>

      <button id="start-btn" class="w-full py-6 text-2xl font-bold bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 active:scale-[0.985] transition-all rounded-3xl disabled:opacity-40 shadow-xl mb-6" disabled>
        게임 시작하기
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="hidden min-h-screen relative">
    <div class="overlay"></div>
    <div class="max-w-5xl mx-auto px-6 pt-8 pb-16 relative z-10">
      <div class="flex items-center justify-between mb-8">
        <div id="round-badge" class="px-6 h-10 flex items-center text-lg font-bold rounded-3xl tracking-wider bg-black/60"></div>
        <div class="text-sm text-slate-300">
          남은 후보 <span id="remaining-count" class="font-mono text-3xl font-bold text-white">16</span>명
        </div>
      </div>
      <div id="matchup-container" class="min-h-[560px] flex items-center justify-center"></div>
    </div>
  </div>

  <!-- WINNER SCREEN -->
  <div id="winner-screen" class="hidden min-h-screen relative">
    <div class="overlay"></div>
    <div class="max-w-2xl mx-auto pt-16 px-6 text-center relative z-10"></div>
  </div>

  <!-- 라운드 전환 -->
  <div id="round-transition" class="hidden fixed inset-0 bg-black/95 z-[300] flex items-center justify-center">
    <div id="round-transition-text" class="text-7xl font-black tracking-widest text-white"></div>
  </div>

  <!-- 프로필 모달 -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/90 z-[400] flex items-center justify-center p-4">
    <div class="bg-zinc-900 rounded-3xl max-w-md w-full border border-white/20 overflow-hidden relative">
      <button onclick="closeProfile()" class="absolute top-4 right-4 w-10 h-10 bg-black/60 hover:bg-black rounded-full flex items-center justify-center text-xl z-10">✕</button>
      <div id="profile-content"></div>
    </div>
  </div>

  <script>
    const BASE = "https://raw.githubusercontent.com/steveJea/vr-ideal-worldcup/main/";
    const CSV_URL = "https://raw.githubusercontent.com/steveJea/vr-ideal-worldcup/main/VR_DATA.csv";

    const BG = {
      title: BASE + "img/stage_bg/title.png",
      64: BASE + "img/stage_bg/64.jpg",
      32: BASE + "img/stage_bg/32.jpg",
      16: BASE + "img/stage_bg/16.jpg",
      8: BASE + "img/stage_bg/8.jpg",
      4: BASE + "img/stage_bg/4.jpg",
      2: BASE + "img/stage_bg/2.jpg",
      win: BASE + "img/stage_bg/win.jpg"
    };

    let globalData = [];
    let currentRoundPlayers = [];
    let nextRoundPlayers = [];
    let currentRoundName = '';
    let selectedSize = null;
    let selectedGender = null;

    function setBackground(key) {
      document.getElementById('body').style.backgroundImage = `url(${BG[key] || BG.win})`;
    }

    async function loadCSVData() {
      const res = await fetch(CSV_URL + '?t=' + Date.now());
      const text = await res.text();
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      const data = [];

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const values = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((h, idx) => obj[h] = values[idx] || '');
        if (obj['이름']) data.push(obj);
      }
      return data;
    }

    function filterByGender(data, mode) {
      if (mode === 'mix') return data;
      return data.filter(p => {
        const g = (p['성별'] || '').toString().toLowerCase().trim();
        if (mode === 'male') return g.includes('male') || g.includes('m') || g.includes('남');
        if (mode === 'female') return g.includes('female') || g.includes('f') || g.includes('여');
        return true;
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getRoundName(num) {
      const map = {64:'64강',32:'32강',16:'16강',8:'8강',4:'4강',2:'결승'};
      return map[num] || `${num}강`;
    }

    function updateStatus() {
      document.getElementById('remaining-count').textContent = currentRoundPlayers.length + nextRoundPlayers.length;
      document.getElementById('round-badge').textContent = currentRoundName;
      const roundKey = currentRoundName.replace('강','').replace('결승','2');
      setBackground(roundKey);
    }

    function createContestantCard(person, onChoose) {
      const name = person['이름'] || '-';
      const id = person.id || 'unknown';
      const card = document.createElement('div');
      card.className = `tournament-card group w-full max-w-[360px] bg-black/70 border border-white/30 hover:border-violet-400 rounded-3xl overflow-hidden cursor-pointer shadow-2xl backdrop-blur-md`;
      card.innerHTML = `
        <div class="relative">
          <img src="${BASE}img/bt_img/${id}.jpg" class="w-full aspect-[4/3] object-cover" alt="${name}">
          <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-black/90 to-transparent"></div>
          <div class="absolute bottom-4 left-4 right-4">
            <div class="text-white text-3xl font-bold tracking-tight">${name}</div>
          </div>
        </div>
      `;
      const img = card.querySelector('img');
      img.onerror = () => { img.src = `${BASE}img/bt_img/${id}.png`; };
      card.addEventListener('click', onChoose);
      return card;
    }

    function renderMatchup(container, p1, p2) {
      container.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = "flex flex-col md:flex-row items-center justify-center gap-8 w-full max-w-[1100px]";
      const vs = document.createElement('div');
      vs.innerHTML = `<div class="text-6xl font-black text-white/80 tracking-widest">VS</div>`;
      wrap.appendChild(createContestantCard(p1, () => handleChoice(p1, p2)));
      wrap.appendChild(vs);
      wrap.appendChild(createContestantCard(p2, () => handleChoice(p2, p1)));
      container.appendChild(wrap);
    }

    function showSelectedHighlight(winner) {
      const div = document.createElement('div');
      div.className = "fixed inset-0 bg-black/95 flex items-center justify-center z-[200]";
      div.innerHTML = `<div class="text-center"><div class="text-emerald-400 text-2xl mb-6">선택 완료 ✓</div><img src="${BASE}img/bt_img/${winner.id}.jpg" class="max-h-[65vh] rounded-3xl shadow-2xl border-4 border-emerald-400 mx-auto" onerror="this.src='${BASE}img/bt_img/${winner.id}.png'"><div class="text-4xl font-bold mt-6 text-white">${winner['이름']}</div></div>`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 1250);
    }

    function handleChoice(winner, loser) {
      nextRoundPlayers.push(winner);
      showSelectedHighlight(winner);
      setTimeout(showNextMatchup, 1300);
    }

    async function showNextMatchup() {
      const container = document.getElementById('matchup-container');
      if (currentRoundPlayers.length === 0 && nextRoundPlayers.length > 0) {
        currentRoundPlayers = shuffle(nextRoundPlayers);
        nextRoundPlayers = [];
        currentRoundName = getRoundName(currentRoundPlayers.length);
        updateStatus();
        const overlay = document.getElementById('round-transition');
        document.getElementById('round-transition-text').textContent = currentRoundName;
        overlay.classList.remove('hidden');
        await new Promise(r => setTimeout(r, 1200));
        overlay.classList.add('hidden');
      }
      if (currentRoundPlayers.length <= 1) {
        showWinner(currentRoundPlayers[0] || nextRoundPlayers[0]);
        return;
      }
      const p1 = currentRoundPlayers.shift();
      const p2 = currentRoundPlayers.shift();
      renderMatchup(container, p1, p2);
      updateStatus();
    }

    function showWinner(winner) {
      let hallOfFame = JSON.parse(localStorage.getItem('hallOfFame') || '[]');
      const exist = hallOfFame.find(w => w.id === winner.id);
      if (exist) exist.wins++;
      else hallOfFame.push({id: winner.id, name: winner['이름'], wins: 1});
      localStorage.setItem('hallOfFame', JSON.stringify(hallOfFame));

      document.getElementById('game-screen').classList.add('hidden');
      const ws = document.getElementById('winner-screen');
      ws.classList.remove('hidden');
      setBackground('win');

      let history = hallOfFame.sort((a,b)=>b.wins-a.wins).map(w => `
        <div class="flex gap-4 bg-black/60 p-4 rounded-2xl">
          <img src="${BASE}img/bt_img/${w.id}.jpg" class="w-16 h-16 object-cover rounded-xl" onerror="this.src='${BASE}img/bt_img/${w.id}.png'">
          <div><div class="font-bold">${w.name}</div><div class="text-emerald-400">${w.wins}회 우승</div></div>
        </div>
      `).join('');

      ws.querySelector('div').innerHTML = `
        <div class="max-w-2xl mx-auto pt-12 px-6 text-center">
          <div class="text-7xl mb-4">👑</div>
          <h2 class="text-6xl font-black mb-3">최종 우승자</h2>
          <div class="mx-auto w-96 rounded-3xl overflow-hidden border-8 border-yellow-400 my-10 relative">
            <img src="${BASE}img/bt_img/${winner.id}.jpg" class="w-full" onerror="this.src='${BASE}img/bt_img/${winner.id}.png'">
          </div>
          <div class="text-5xl font-bold mb-4">${winner['이름']}</div>
          <button onclick="showProfile(${JSON.stringify(winner)})" class="mb-10 w-14 h-14 rounded-full bg-white/20 hover:bg-white/30 border border-white/40 text-3xl font-bold">?</button>
          <div class="mt-8">
            <h3 class="text-xl mb-6 text-violet-300 font-bold">🏆 역대 우승자</h3>
            <div class="grid grid-cols-1 gap-4 max-h-[380px] overflow-auto">${history}</div>
          </div>
          <button onclick="location.reload()" class="mt-12 px-12 py-5 bg-white text-black font-bold text-xl rounded-3xl">다시 시작하기</button>
        </div>
      `;
    }

    function showProfile(person) {
      const name = person['이름'] || '-';
      const gender = person['성별'] || '-';
      const age = person['나이'] || '-';
      const region = person['지역'] || '-';
      const grade = person['등급'] || '-';
      const cls = person['클래스'] || '-';
      const attr = person['속성'] || '-';

      document.getElementById('profile-content').innerHTML = `
        <div class="p-6">
          <img src="${BASE}img/bt_img/${person.id}.jpg" class="w-full rounded-2xl mb-6" onerror="this.src='${BASE}img/bt_img/${person.id}.png'">
          <div class="text-3xl font-bold mb-6">${name}</div>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><span class="text-zinc-400">성별</span><br>${gender}</div>
            <div><span class="text-zinc-400">나이</span><br>${age}</div>
            <div><span class="text-zinc-400">지역</span><br>${region}</div>
            <div><span class="text-zinc-400">등급</span><br>${grade}</div>
            <div><span class="text-zinc-400">클래스</span><br>${cls}</div>
            <div><span class="text-zinc-400">속성</span><br>${attr}</div>
          </div>
        </div>
      `;
      document.getElementById('profile-modal').classList.remove('hidden');
    }

    function closeProfile() {
      document.getElementById('profile-modal').classList.add('hidden');
    }

    function initTournament(contestants) {
      currentRoundPlayers = shuffle(contestants);
      nextRoundPlayers = [];
      currentRoundName = getRoundName(currentRoundPlayers.length);
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      setBackground('64');
      updateStatus();
      showNextMatchup();
    }

    function setupGenderButtons() {
      document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('border-violet-500','bg-violet-950'));
          btn.classList.add('border-violet-500','bg-violet-950');
          selectedGender = btn.dataset.gender;
          checkStartReady();
        };
      });
    }

    function setupSizeButtons() {
      const container = document.getElementById('size-buttons');
      [16,32,64].forEach(n => {
        const btn = document.createElement('div');
        btn.className = `cursor-pointer border-2 border-slate-700 hover:border-violet-500 bg-black/70 rounded-3xl p-8 transition-all backdrop-blur-md`;
        btn.innerHTML = `<div class="text-5xl font-black">${n}강</div><div class="text-slate-400 mt-2">${n}명</div>`;
        btn.onclick = () => {
          document.querySelectorAll('#size-buttons > div').forEach(b => b.classList.remove('border-violet-500','bg-violet-950'));
          btn.classList.add('border-violet-500','bg-violet-950');
          selectedSize = n;
          checkStartReady();
        };
        container.appendChild(btn);
      });
    }

    function checkStartReady() {
      document.getElementById('start-btn').disabled = !(selectedGender && selectedSize);
    }

    async function startGame() {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = "로딩 중...";

      try {
        globalData = await loadCSVData();
        let filtered = filterByGender(globalData, selectedGender);

        console.log(`전체: ${globalData.length}, female: ${filtered.length}`);

        if (filtered.length < 4) {
          alert(`선택한 성별(${selectedGender})의 카드가 부족합니다. (${filtered.length}개)`);
          btn.disabled = false;
          btn.textContent = "게임 시작하기";
          return;
        }

        let size = selectedSize;
        if (filtered.length < size) size = filtered.length;
        while (size > 2 && (size & (size - 1)) !== 0) size--;
        initTournament(shuffle(filtered).slice(0, size));
      } catch (e) {
        console.error(e);
        alert("데이터 로딩 실패");
        btn.disabled = false;
        btn.textContent = "게임 시작하기";
      }
    }

    document.addEventListener('contextmenu', e => { e.preventDefault(); alert("마우스 오른쪽 버튼은 사용할 수 없습니다."); });

    window.onload = () => {
      setBackground('title');
      setupGenderButtons();
      setupSizeButtons();
      document.getElementById('start-btn').onclick = startGame;
    };
  </script>
</body>
</html>
